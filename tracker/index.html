<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Onboarding Experiment · Tracker</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600&display=swap"
    rel="stylesheet"
  />

  <style>
    :root {
      --bg-base: #07091a;
      --bg-deep: #050714;
      --bg-surface: #0f1328;
      --bg-elevated: #181c34;
      --bg-glass: rgba(20, 24, 48, 0.55);

      --border: rgba(255, 255, 255, 0.06);
      --border-strong: rgba(255, 255, 255, 0.14);
      --border-warm: rgba(249, 115, 22, 0.18);

      --text: #f5f7ff;
      --text-muted: #9aa3c2;
      --text-dim: #5b6486;

      --accent: #f97316;
      --accent-bright: #fb923c;
      --accent-deep: #c2410c;
      --accent-soft: rgba(249, 115, 22, 0.14);

      --flow-a: #60a5fa;
      --flow-a-soft: rgba(96, 165, 250, 0.14);
      --flow-b: #f97316;
      --flow-b-soft: rgba(249, 115, 22, 0.14);

      --success: #4ade80;
      --warning: #fbbf24;
      --danger: #f87171;
      --info: #38bdf8;

      --font-sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      --font-display: "Instrument Serif", "Times New Roman", Georgia, serif;
      --font-mono: "JetBrains Mono", "SF Mono", Menlo, Monaco, monospace;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: var(--font-sans);
      background: var(--bg-base);
      color: var(--text);
      letter-spacing: -0.011em;
      min-height: 100vh;
    }

    /* Ambient grid */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px);
      background-size: 64px 64px;
      mask-image: radial-gradient(ellipse 80% 70% at 50% 50%, black 30%, transparent 100%);
      -webkit-mask-image: radial-gradient(ellipse 80% 70% at 50% 50%, black 30%, transparent 100%);
      opacity: 0.5;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 3rem 2rem 6rem;
      position: relative;
      z-index: 1;
    }

    /* Header */
    header.tracker-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 2rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 3rem;
    }

    .header-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.6rem;
    }
    .header-eyebrow::before {
      content: "";
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 12px var(--accent);
    }

    h1.tracker-title {
      margin: 0;
      font-family: var(--font-sans);
      font-weight: 700;
      font-size: 2.6rem;
      letter-spacing: -0.028em;
      line-height: 1.1;
    }
    h1.tracker-title em {
      font-family: var(--font-display);
      font-style: italic;
      font-weight: 400;
      color: var(--accent);
    }

    .tracker-sub {
      color: var(--text-muted);
      font-size: 1rem;
      margin: 0.6rem 0 0;
      max-width: 60ch;
    }

    .header-nav {
      display: flex;
      gap: 0.6rem;
      flex-shrink: 0;
    }
    .last-updated {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.55rem 0.9rem;
      font-size: 0.78rem;
      font-family: var(--font-mono);
      color: var(--text-muted);
      background: var(--bg-surface);
      border: 1px solid var(--border-strong);
      border-radius: 6px;
      letter-spacing: 0.02em;
    }
    .last-updated strong {
      color: var(--text);
      font-weight: 600;
    }
    .last-updated-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 8px var(--success);
    }

    /* Snapshot meta strip */
    .meta-strip {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1rem;
      margin-bottom: 3rem;
    }
    .meta-strip > * { min-width: 0; }
    .meta-cell {
      padding: 1rem 1.2rem;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 8px;
    }
    .meta-cell.is-latest {
      border-color: var(--border-strong);
      background: var(--bg-surface);
    }
    .meta-cell-eyebrow {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 0.4rem;
    }
    .meta-cell.is-latest .meta-cell-eyebrow { color: var(--accent); }
    .meta-cell-title {
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--text);
      margin: 0 0 0.3rem;
    }
    .meta-cell-detail {
      font-size: 0.82rem;
      color: var(--text-muted);
      margin: 0;
      line-height: 1.5;
    }
    .meta-cell-detail code {
      font-family: var(--font-mono);
      font-size: 0.78rem;
      color: var(--accent-bright);
    }

    /* Section */
    section.metric-section {
      margin-bottom: 3.5rem;
    }
    .section-header {
      margin-bottom: 1.4rem;
    }
    .section-eyebrow {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 0.4rem;
    }
    .section-title {
      font-size: 1.4rem;
      font-weight: 600;
      margin: 0 0 0.4rem;
      letter-spacing: -0.02em;
    }
    .section-sub {
      font-size: 0.92rem;
      color: var(--text-muted);
      margin: 0;
      max-width: 80ch;
      line-height: 1.55;
    }

    /* Comparison grid — sized to fit 4 columns at 1200px container */
    .comparison-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 0.8rem;
      margin-bottom: 1.4rem;
    }
    .comparison-grid > * { min-width: 0; }
    .compare-cell { padding: 1rem 1.1rem; }
    .compare-cell {
      padding: 1.2rem 1.3rem;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      position: relative;
    }
    .compare-cell.is-latest {
      border-color: var(--border-strong);
      box-shadow: none;
    }
    .compare-cell.is-latest .compare-cell-label { color: var(--accent); }
    .compare-cell-label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 0.7rem;
    }
    .compare-cell.is-latest .compare-cell-label {
      color: var(--accent);
    }
    .compare-cell-stat {
      font-family: var(--font-display);
      font-size: 2.6rem;
      line-height: 1;
      font-weight: 400;
      color: var(--text);
      margin: 0;
      letter-spacing: -0.01em;
    }
    .compare-cell-stat-suffix {
      font-family: var(--font-sans);
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-left: 0.4rem;
      font-weight: 500;
    }
    .compare-cell-detail {
      font-size: 0.82rem;
      color: var(--text-muted);
      margin: 0.7rem 0 0;
      line-height: 1.5;
    }
    .compare-cell-detail code {
      font-family: var(--font-mono);
      font-size: 0.76rem;
      color: var(--accent-bright);
    }

    /* Bar chart (variant split) */
    .split-bar {
      display: flex;
      width: 100%;
      height: 8px;
      border-radius: 4px;
      overflow: hidden;
      margin: 0.6rem 0 0.4rem;
      background: rgba(255,255,255,0.04);
    }
    .split-bar-flowA { background: var(--flow-a); }
    .split-bar-flowB { background: var(--flow-b); }
    .split-legend {
      display: flex;
      justify-content: space-between;
      font-size: 0.74rem;
      color: var(--text-muted);
      font-family: var(--font-mono);
    }
    .split-legend-flowA { color: var(--flow-a); }
    .split-legend-flowB { color: var(--flow-b); }

    /* Funnel */
    .funnel-rows {
      display: grid;
      gap: 0.7rem;
    }
    .funnel-row {
      display: grid;
      grid-template-columns: 90px 1fr 1fr;
      gap: 0.5rem;
      align-items: start;
    }
    .funnel-row-step {
      font-size: 0.74rem;
      color: var(--text-muted);
      font-family: var(--font-mono);
      padding-top: 0.1rem;
      line-height: 1.25;
    }
    .funnel-bar-cell { display: flex; flex-direction: column; gap: 0.25rem; min-width: 0; }
    .funnel-bar-track {
      position: relative;
      height: 12px;
      background: rgba(255,255,255,0.04);
      border-radius: 3px;
      overflow: hidden;
    }
    .funnel-bar-fill {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      border-radius: 3px;
    }
    .funnel-bar-flowA { background: var(--flow-a); }
    .funnel-bar-flowB { background: var(--flow-b); }
    .funnel-bar-num {
      font-size: 0.72rem;
      font-family: var(--font-mono);
      font-weight: 600;
      line-height: 1;
      letter-spacing: 0;
    }
    .funnel-bar-num .pct-suffix { font-weight: 400; opacity: 0.7; }
    .funnel-bar-num.flowA-num { color: var(--flow-a); }
    .funnel-bar-num.flowB-num { color: var(--flow-b); }
    .funnel-rates {
      display: flex;
      gap: 1.2rem;
      margin-top: 0.6rem;
      font-size: 0.78rem;
      color: var(--text-muted);
    }
    .funnel-rates strong {
      color: var(--text);
      font-family: var(--font-mono);
    }

    /* North star table */
    table.compare-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.86rem;
      table-layout: auto;
    }
    table.compare-table td { word-break: break-word; }
    .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    table.compare-table th {
      text-align: left;
      padding: 0.5rem 0.7rem;
      font-weight: 600;
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
      border-bottom: 1px solid var(--border-strong);
    }
    table.compare-table th.flowA { color: var(--flow-a); }
    table.compare-table th.flowB { color: var(--flow-b); }
    table.compare-table td {
      padding: 0.6rem 0.7rem;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      font-family: var(--font-mono);
      font-size: 0.85rem;
    }
    table.compare-table td:first-child {
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 0.86rem;
    }
    table.compare-table tr.zero-row td:not(:first-child) {
      color: var(--text-dim);
      opacity: 0.6;
    }

    /* Email check distribution bar */
    .donut-stack {
      display: flex;
      width: 100%;
      height: 32px;
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 0.8rem;
    }
    .donut-seg {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.74rem;
      font-weight: 600;
      color: var(--text);
      font-family: var(--font-mono);
      mix-blend-mode: difference;
    }
    .donut-seg-temp { background: var(--accent); }
    .donut-seg-returning { background: var(--flow-a); }
    .donut-seg-new { background: var(--success); }
    .donut-seg-username { background: var(--text-dim); }
    .donut-legend {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.4rem 1rem;
      font-size: 0.76rem;
      color: var(--text-muted);
    }
    .donut-legend-row { display: flex; align-items: center; gap: 0.4rem; }
    .donut-legend-dot {
      width: 8px; height: 8px; border-radius: 50%;
    }

    /* Delta block */
    .delta-block {
      margin-top: 1rem;
      padding: 0.9rem 1.1rem;
      background: var(--bg-elevated);
      border-left: 3px solid var(--accent);
      border-radius: 0 6px 6px 0;
    }
    .delta-block-label {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.3rem;
    }
    .delta-block p {
      margin: 0;
      font-size: 0.88rem;
      color: var(--text);
      line-height: 1.55;
    }

    /* Open questions */
    .questions-list {
      margin: 0;
      padding: 0;
      list-style: none;
    }
    .questions-list li {
      padding: 1rem 1.2rem;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 0.6rem;
      font-size: 0.92rem;
      color: var(--text);
      line-height: 1.55;
      position: relative;
      padding-left: 2.6rem;
    }
    .questions-list li::before {
      content: "?";
      position: absolute;
      left: 1rem;
      top: 1rem;
      width: 22px; height: 22px;
      border-radius: 50%;
      background: var(--accent);
      color: var(--bg-deep);
      font-weight: 700;
      font-size: 0.82rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-mono);
    }

    .leak-status {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.3rem 0.7rem;
      border-radius: 4px;
      font-size: 0.76rem;
      font-weight: 600;
      font-family: var(--font-mono);
    }
    .leak-status.is-active {
      background: rgba(248, 113, 113, 0.14);
      color: var(--danger);
      border: 1px solid rgba(248, 113, 113, 0.3);
    }

    /* Historical comparison — block layout */
    .hist-blocks { display: grid; gap: 1rem; }
    .hist-block {
      padding: 1.1rem 1.3rem;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--info);
      border-radius: 8px;
    }
    .hist-block-highlight {
      background: linear-gradient(135deg, rgba(74, 222, 128, 0.05), rgba(74, 222, 128, 0.01));
      border: 1px solid rgba(74, 222, 128, 0.25);
      border-left: 3px solid var(--success);
    }
    .hist-block-highlight .hist-block-title { color: var(--success); }
    .hist-block-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 0.8rem;
      margin-bottom: 0.7rem;
    }
    .hist-block-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.01em;
    }
    .hist-block-subtitle {
      font-size: 0.84rem;
      color: var(--text-muted);
      line-height: 1.5;
      margin: 0.3rem 0 0;
    }
    .hist-comparison {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 1rem;
      align-items: center;
      padding: 1rem;
      background: var(--bg-elevated);
      border-radius: 8px;
      margin: 0.8rem 0 0;
    }
    .hist-comp-side {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }
    .hist-comp-experiment { text-align: right; }
    .hist-comp-label {
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
      font-family: var(--font-mono);
    }
    .hist-comp-value {
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--text);
      font-family: var(--font-display);
      letter-spacing: -0.01em;
    }
    .hist-comp-arrow {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
    }
    .hist-delta {
      padding: 0.3rem 0.7rem;
      border-radius: 4px;
      font-family: var(--font-mono);
      font-size: 0.86rem;
      font-weight: 700;
    }
    .hist-delta.delta-down { background: rgba(74, 222, 128, 0.16); color: var(--success); border: 1px solid rgba(74, 222, 128, 0.3); }
    .hist-delta.delta-up { background: rgba(248, 113, 113, 0.16); color: var(--danger); border: 1px solid rgba(248, 113, 113, 0.3); }
    .hist-delta.delta-flat { background: rgba(154, 163, 194, 0.14); color: var(--text-muted); border: 1px solid var(--border-strong); }
    .hist-verdict {
      margin-top: 0.6rem;
      padding: 0.55rem 0.8rem;
      background: rgba(56, 189, 248, 0.06);
      border-left: 2px solid var(--info);
      border-radius: 0 4px 4px 0;
      font-size: 0.82rem;
      color: var(--text);
      line-height: 1.5;
    }
    .hist-details {
      margin-top: 0.8rem;
    }
    .hist-details summary {
      cursor: pointer;
      font-size: 0.78rem;
      font-family: var(--font-mono);
      color: var(--text-muted);
      padding: 0.4rem 0;
      letter-spacing: 0.04em;
    }
    .hist-details summary:hover { color: var(--text); }
    .hist-details[open] summary { color: var(--text); margin-bottom: 0.5rem; }
    .hist-table tr.is-experiment-row td {
      background: var(--accent-soft);
      color: var(--text);
      font-weight: 600;
    }

    @media (max-width: 720px) {
      .hist-comparison { grid-template-columns: 1fr; text-align: left; }
      .hist-comp-experiment { text-align: left; }
    }

    /* Historical comparison badges + notes */
    .hist-badge {
      display: inline-block;
      padding: 0.2rem 0.5rem;
      border-radius: 3px;
      font-family: var(--font-mono);
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      flex-shrink: 0;
      letter-spacing: 0.06em;
    }
    .hist-pending  { background: rgba(56, 189, 248, 0.16); color: var(--info); border: 1px solid rgba(56, 189, 248, 0.3); }
    .hist-external { background: rgba(251, 191, 36, 0.14); color: var(--warning); border: 1px solid rgba(251, 191, 36, 0.3); }
    .hist-ready    { background: rgba(74, 222, 128, 0.16); color: var(--success); border: 1px solid rgba(74, 222, 128, 0.3); }
    .hist-pending-note {
      padding: 0.55rem 0.7rem;
      background: rgba(56, 189, 248, 0.05);
      border-left: 2px solid var(--info);
      border-radius: 0 4px 4px 0;
      font-size: 0.78rem;
      color: var(--text-muted);
      line-height: 1.5;
      margin-top: 0.5rem;
    }
    .hist-pending-label {
      font-family: var(--font-mono);
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--info);
      margin-right: 0.4rem;
      font-weight: 700;
    }

    /* Delta cards — bullets + verdict badge */
    .delta-card {
      margin-top: 1rem;
      padding: 1rem 1.2rem;
      background: var(--bg-elevated);
      border-radius: 8px;
      border-left: 3px solid var(--border-strong);
    }
    .delta-header {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 0.6rem;
    }
    .delta-metric-label {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.01em;
      margin-right: auto;
    }
    .delta-verdict-badge {
      display: inline-block;
      padding: 0.2rem 0.5rem;
      border-radius: 3px;
      font-family: var(--font-mono);
      font-size: 0.66rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .verdict-winner    { background: rgba(74, 222, 128, 0.16);  color: var(--success); border: 1px solid rgba(74, 222, 128, 0.3); }
    .verdict-explained { background: rgba(56, 189, 248, 0.16);  color: var(--info);    border: 1px solid rgba(56, 189, 248, 0.3); }
    .verdict-caveat    { background: rgba(251, 191, 36, 0.16);  color: var(--warning); border: 1px solid rgba(251, 191, 36, 0.3); }
    .verdict-uxissue   { background: rgba(248, 113, 113, 0.16); color: var(--danger);  border: 1px solid rgba(248, 113, 113, 0.3); }
    .verdict-watch     { background: rgba(154, 163, 194, 0.14); color: var(--text-muted); border: 1px solid var(--border-strong); }
    .verdict-bug       { background: rgba(248, 113, 113, 0.10); color: var(--danger);  border: 1px solid rgba(248, 113, 113, 0.22); }

    .delta-card.has-winner-flowA { border-left-color: var(--flow-a); }
    .delta-card.has-winner-flowB { border-left-color: var(--flow-b); }

    .delta-tldr {
      font-size: 0.88rem;
      color: var(--text);
      line-height: 1.5;
      margin: 0 0 0.6rem;
      font-weight: 500;
    }
    ul.delta-bullets {
      margin: 0;
      padding-left: 1.1rem;
      list-style: none;
    }
    ul.delta-bullets li {
      position: relative;
      font-size: 0.82rem;
      color: var(--text-muted);
      line-height: 1.55;
      margin-bottom: 0.3rem;
      padding-left: 0.4rem;
    }
    ul.delta-bullets li::before {
      content: "▸";
      position: absolute;
      left: -1rem;
      color: var(--text-dim);
      font-size: 0.75rem;
    }

    /* Hypothesis card */
    .hypothesis-card {
      margin-top: 1rem;
      padding: 1.1rem 1.3rem;
      background: linear-gradient(135deg, rgba(56, 189, 248, 0.06), rgba(56, 189, 248, 0.02));
      border: 1px solid rgba(56, 189, 248, 0.18);
      border-left: 3px solid var(--info);
      border-radius: 8px;
    }
    .hypothesis-header {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 0.6rem;
    }
    .hypothesis-badge {
      display: inline-block;
      padding: 0.2rem 0.5rem;
      border-radius: 3px;
      background: var(--info);
      color: var(--bg-deep);
      font-family: var(--font-mono);
      font-size: 0.66rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .hypothesis-label {
      font-size: 0.92rem;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.01em;
    }
    .hypothesis-tldr {
      font-size: 0.88rem;
      color: var(--text);
      line-height: 1.5;
      margin: 0 0 0.7rem;
    }
    .hypothesis-bullets {
      margin: 0;
      padding-left: 1.1rem;
      list-style: none;
    }
    .hypothesis-bullets li {
      position: relative;
      font-size: 0.83rem;
      color: var(--text-muted);
      line-height: 1.55;
      margin-bottom: 0.35rem;
      padding-left: 0.4rem;
    }
    .hypothesis-bullets li::before {
      content: "▸";
      position: absolute;
      left: -1rem;
      color: var(--info);
      font-size: 0.75rem;
    }
    .hypothesis-bullets li strong {
      color: var(--text);
      font-weight: 600;
    }

    /* Next steps list */
    ul.next-steps-list { margin: 0; padding: 0; list-style: none; }
    ul.next-steps-list li { display: flex; align-items: flex-start; gap: 0.6rem; padding: 0.55rem 0; font-size: 0.88rem; color: var(--text); line-height: 1.55; border-bottom: 1px solid var(--border); }
    ul.next-steps-list li:last-child { border-bottom: 0; }
    .ns-marker { flex-shrink: 0; width: 22px; height: 22px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-family: var(--font-mono); font-size: 0.78rem; }
    .ns-marker-action { background: var(--warning); color: var(--bg-deep); }
    .ns-marker-open { background: var(--info); color: var(--bg-deep); border-radius: 50%; }

    /* Conclusion cards — TL;DR + bullets */
    .conclusion-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 1rem;
    }
    .conclusion-card {
      padding: 1.2rem 1.3rem;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--success);
      border-radius: 8px;
      min-width: 0;
    }
    .conclusion-card-question {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.7rem;
      letter-spacing: -0.01em;
      line-height: 1.35;
    }
    .conclusion-card-tldr {
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
      padding: 0.55rem 0.7rem;
      background: rgba(74, 222, 128, 0.08);
      border-radius: 5px;
      margin-bottom: 0.7rem;
    }
    .tldr-badge {
      display: inline-block;
      flex-shrink: 0;
      padding: 0.15rem 0.42rem;
      border-radius: 3px;
      background: var(--success);
      color: var(--bg-deep);
      font-family: var(--font-mono);
      font-size: 0.66rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      line-height: 1.4;
    }
    .tldr-text {
      font-size: 0.85rem;
      color: var(--text);
      line-height: 1.45;
      font-weight: 500;
    }
    ul.conclusion-bullets {
      margin: 0 0 0.8rem;
      padding-left: 1.1rem;
      list-style: none;
    }
    ul.conclusion-bullets li {
      position: relative;
      font-size: 0.83rem;
      color: var(--text-muted);
      line-height: 1.55;
      margin-bottom: 0.4rem;
      padding-left: 0.4rem;
    }
    ul.conclusion-bullets li::before {
      content: "▸";
      position: absolute;
      left: -1rem;
      color: var(--accent);
      font-size: 0.75rem;
    }
    p.conclusion-fallback-body {
      font-size: 0.85rem;
      color: var(--text-muted);
      line-height: 1.5;
      margin: 0 0 0.8rem;
    }
    .conclusion-card-evidence {
      padding-top: 0.6rem;
      border-top: 1px solid var(--border);
      font-size: 0.74rem;
      color: var(--text-dim);
      line-height: 1.45;
    }
    .evidence-label {
      font-family: var(--font-mono);
      font-size: 0.66rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-right: 0.4rem;
      font-weight: 600;
    }

    /* Winner badge */
    .winner-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.32rem;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-family: var(--font-mono);
      vertical-align: middle;
    }
    .winner-badge.flowA { background: rgba(96, 165, 250, 0.16); color: var(--flow-a); border: 1px solid rgba(96, 165, 250, 0.32); }
    .winner-badge.flowB { background: rgba(249, 115, 22, 0.16); color: var(--flow-b); border: 1px solid rgba(249, 115, 22, 0.32); }
    .winner-badge.tied  { background: rgba(154, 163, 194, 0.14); color: var(--text-muted); border: 1px solid var(--border-strong); }
    .winner-badge.na    { background: rgba(154, 163, 194, 0.08); color: var(--text-dim); border: 1px solid var(--border); }

    /* Scorecard */
    .scorecard-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      font-size: 0.88rem;
    }
    .scorecard-table thead th {
      text-align: left;
      padding: 0.8rem 0.9rem;
      font-weight: 600;
      font-size: 0.7rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-dim);
      background: var(--bg-elevated);
      border-bottom: 1px solid var(--border-strong);
    }
    .scorecard-table thead th.center { text-align: center; }
    .scorecard-table tbody td {
      padding: 0.85rem 0.9rem;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    .scorecard-table tbody td.metric-name { color: var(--text); font-weight: 500; }
    .scorecard-table tbody td.metric-direction {
      font-size: 0.74rem;
      color: var(--text-dim);
      font-family: var(--font-mono);
    }
    .scorecard-table tbody td.value {
      text-align: center;
      font-family: var(--font-mono);
      font-weight: 600;
      color: var(--text-muted);
    }
    .scorecard-table tbody td.value.is-winner {
      color: var(--text);
      background: rgba(74, 222, 128, 0.06);
    }
    .scorecard-table tbody td.winner-cell { text-align: center; }
    .scorecard-table tbody tr:hover td { background: rgba(255,255,255,0.02); }

    /* Verdict box */
    .verdict-box {
      padding: 1.4rem 1.6rem;
      background: linear-gradient(135deg, var(--bg-surface), var(--bg-elevated));
      border: 1px solid var(--accent);
      border-radius: 10px;
      margin-top: 1.5rem;
    }
    .verdict-eyebrow {
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 0.5rem;
    }
    .verdict-headline {
      font-size: 1.4rem;
      font-weight: 600;
      color: var(--text);
      margin: 0 0 0.6rem;
      letter-spacing: -0.02em;
      line-height: 1.3;
    }
    .verdict-body {
      font-size: 0.95rem;
      color: var(--text-muted);
      line-height: 1.6;
      margin: 0;
    }

    .loading {
      padding: 4rem 2rem;
      text-align: center;
      color: var(--text-muted);
      font-size: 1rem;
    }

    /* Intermediate breakpoint for tablet-landscape and laptop-narrow */
    @media (max-width: 1100px) {
      .comparison-grid {
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 0.7rem;
      }
      .compare-cell { padding: 0.9rem 1rem; }
      .compare-cell-stat { font-size: 2.1rem; }
    }
    @media (max-width: 1024px) {
      .conclusion-grid, .meta-strip {
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      }
      h1.tracker-title { font-size: clamp(2rem, 4vw, 2.6rem); }
      .section-title, .verdict-headline { font-size: clamp(1.2rem, 2.2vw, 1.4rem); }
      .container { padding: 2.5rem 1.5rem 5rem; }
    }

    /* Force narrow column for funnel rows on small screens since the auto-fit handles other grids */
    @media (max-width: 880px) {
      .funnel-row { grid-template-columns: 80px 1fr; gap: 0.4rem; }
      .funnel-row .funnel-bar-track:nth-child(3) { grid-column: 2 / 3; margin-top: 0.2rem; }
      header.tracker-header { flex-direction: column; align-items: flex-start; }
      h1.tracker-title { font-size: 2rem; }
      .container { padding: 2rem 1rem 4rem; }
    }
    @media (max-width: 540px) {
      .scorecard-table { font-size: 0.78rem; }
      .scorecard-table thead th, .scorecard-table tbody td { padding: 0.5rem 0.5rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="tracker-header">
      <div>
        <span class="header-eyebrow">Experiment Tracker · post-100% rollout</span>
        <h1 class="tracker-title">Login A/B · <em>evolution</em></h1>
        <p class="tracker-sub">Tracking how the SQR-6510 login experiment metrics evolve as new data accrues. Snapshots compared side-by-side, with deltas and open questions per metric.</p>
      </div>
      <div class="header-nav">
        <span id="last-updated-badge" class="last-updated">
          <span class="last-updated-dot"></span>
          Data through <strong id="last-updated-date">—</strong>
        </span>
      </div>
    </header>

    <div id="meta" class="meta-strip"></div>

    <main id="content" class="loading">Loading snapshots…</main>
  </div>

  <script>
    const SNAPSHOT_FILES = [
      { date: '2026-05-06', file: '../data/2026-05-06.json' },
      { date: '2026-05-08', file: '../data/2026-05-08.json' }
    ];

    async function load() {
      const data = await Promise.all(SNAPSHOT_FILES.map(s =>
        fetch(s.file).then(r => r.json()).then(json => ({ ...s, json }))
      ));
      render(data);
    }

    function fmtPct(n) { return (n == null || isNaN(n)) ? '—' : n.toFixed(1) + '%'; }
    function fmtInt(n) { return (n == null || isNaN(n)) ? '—' : Math.round(n).toLocaleString(); }

    function render(snapshots) {
      const week1 = snapshots.find(s => s.date === '2026-05-06').json;
      const week2 = snapshots.find(s => s.date === '2026-05-08').json;
      const cum = week2.windows.cumulative;
      const post = week2.windows.postRollout;
      const postNew = week2.windows.postRolloutNew;

      // Last-updated badge — show latest snapshot date
      const latestDate = snapshots.map(s => s.date).sort().pop();
      const formatted = new Date(latestDate + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      document.getElementById('last-updated-date').textContent = formatted;

      // Meta strip — 4 windows
      const metaEl = document.getElementById('meta');
      metaEl.innerHTML = `
        <div class="meta-cell">
          <div class="meta-cell-eyebrow">Week 1 · ramp</div>
          <h3 class="meta-cell-title">Apr 30 → May 6</h3>
          <p class="meta-cell-detail">Phased rollout (1% → 50%). What the ramp window saw.</p>
        </div>
        <div class="meta-cell">
          <div class="meta-cell-eyebrow">Week 2 · cumulative</div>
          <h3 class="meta-cell-title">${cum.windowStart} → ${cum.windowEnd}</h3>
          <p class="meta-cell-detail">All devices since experiment start (~${cum.approxDays} days). Broad operational view.</p>
        </div>
        <div class="meta-cell">
          <div class="meta-cell-eyebrow">Week 2 · post-100% all</div>
          <h3 class="meta-cell-title">${post.windowStart} → ${post.windowEnd}</h3>
          <p class="meta-cell-detail">All devices firing post-rollout (~${post.approxDays} days). Includes legacy users with sticky LD buckets.</p>
        </div>
        <div class="meta-cell is-latest">
          <div class="meta-cell-eyebrow">★ Week 2 · NEW only</div>
          <h3 class="meta-cell-title">${postNew.windowStart} → ${postNew.windowEnd}</h3>
          <p class="meta-cell-detail">Devices first seen May 7+. Cleanest experiment read — no legacy contamination from sticky LD buckets.</p>
        </div>
      `;

      const sections = [];

      // === 0.5 Abandon followup — answers the Flow B login_abandoned concern ===
      if (week2.abandonFollowup) sections.push(renderAbandonFollowup(week2.abandonFollowup));

      // === 1. Conclusions — questions we answered with evidence ===
      if (week2.conclusions) sections.push(renderConclusions(week2.conclusions));

      // === 2. Final scorecard + verdict — moved up so the verdict is visible early ===
      if (week2.scorecard) sections.push(renderScorecard(week2.scorecard));

      // === 2.5 Historical comparison — pre-experiment vs experiment ===
      if (week2.historicalComparison) sections.push(renderHistoricalComparison(week2.historicalComparison));

      // === 3. Indie classification — Tristan's headline question, full callout ===
      if (week2.indieClassification) sections.push(renderIndieClassification(week2.indieClassification));

      // === 4. Variant balance (4 cols) ===
      sections.push(renderVariantBalance(week1, cum, post, postNew, week2.deltas.vsWeek1Snapshot.notes[0]));

      // === 5. Funnel (4 cols) ===
      sections.push(renderFunnel(week1, cum, post, postNew, week2.deltas.vsWeek1Snapshot.notes[1]));

      // === 6. SRM investigation deep-dive ===
      if (week2.srmInvestigation) sections.push(renderSrmInvestigation(week2.srmInvestigation));

      // === 7. Email check (4 cols) ===
      sections.push(renderEmailCheck(week1, cum, post, postNew, week2.deltas.vsWeek1Snapshot.notes[2]));

      // === 8. temp_password drop investigation ===
      if (week2.tempPasswordInvestigation) sections.push(renderTempPasswordInvestigation(week2.tempPasswordInvestigation));

      // === 9. Per-exposure (4 cols) ===
      sections.push(renderPerExposure(week1, cum, post, postNew, week2.deltas.vsWeek1Snapshot.notes[3]));

      // === 10. Friction (4 cols) ===
      sections.push(renderFriction(week1, cum, post, postNew,
        week2.deltas.vsWeek1Snapshot.notes[4],
        week2.deltas.vsWeek1Snapshot.notes[5]));

      // === 11. Forgot password investigation ===
      if (week2.forgotPasswordInvestigation) sections.push(renderForgotPasswordInvestigation(week2.forgotPasswordInvestigation));

      // === 12. Scope leak (4 cols) ===
      sections.push(renderScopeLeak(cum, post, postNew, week2.deltas.vsWeek1Snapshot.notes[6]));

      // === 13. Next steps — merged action items + open questions ===
      if (week2.actionItems || week2.openQuestions) sections.push(renderNextSteps(week2.actionItems, week2.openQuestions));

      const content = document.getElementById('content');
      content.classList.remove('loading');
      content.innerHTML = sections.join('');
    }

    function renderVariantBalance(w1, cum, post, postNew, delta) {
      const w1Total = w1.variantBalance.snowflake.flowA + w1.variantBalance.snowflake.flowB;
      const w1A = (w1.variantBalance.snowflake.flowA / w1Total * 100).toFixed(1);
      const w1B = (w1.variantBalance.snowflake.flowB / w1Total * 100).toFixed(1);

      const cumA = cum.variantBalance.splitPct.flowA;
      const cumB = cum.variantBalance.splitPct.flowB;
      const postA = post.variantBalance.splitPct.flowA;
      const postB = post.variantBalance.splitPct.flowB;
      const newA = postNew.variantBalance.splitPct.flowA;
      const newB = postNew.variantBalance.splitPct.flowB;

      return `
        <section class="metric-section">
          <div class="section-header">
            <div class="section-eyebrow">Health check · SRM</div>
            <h2 class="section-title">Variant balance — should be 50/50</h2>
            <p class="section-sub">Distinct devices LaunchDarkly assigned to each variant. The "post-100% NEW only" column filters out pre-experiment legacy devices stuck on their original LD bucket — the cleanest experiment read.</p>
          </div>
          <div class="comparison-grid">
            ${variantCell('Week 1 · ramp', w1.variantBalance.snowflake.flowA, w1.variantBalance.snowflake.flowB, w1A, w1B, false)}
            ${variantCell('Week 2 · cumulative', cum.variantBalance.snowflake.flowA, cum.variantBalance.snowflake.flowB, cumA, cumB, false)}
            ${variantCell('Week 2 · post-100% all', post.variantBalance.snowflake.flowA, post.variantBalance.snowflake.flowB, postA, postB, false)}
            ${variantCell('Week 2 · NEW only ★', postNew.variantBalance.snowflake.flowA, postNew.variantBalance.snowflake.flowB, newA, newB, true)}
          </div>
          ${deltaBlock(delta)}
        </section>
      `;
    }

    function variantCell(label, a, b, aPct, bPct, isLatest) {
      return `
        <div class="compare-cell ${isLatest ? 'is-latest' : ''}">
          <div class="compare-cell-label">${label}</div>
          <p class="compare-cell-stat">${aPct}<span class="compare-cell-stat-suffix">/ ${bPct}</span></p>
          <div class="split-bar">
            <div class="split-bar-flowA" style="width: ${aPct}%"></div>
            <div class="split-bar-flowB" style="width: ${bPct}%"></div>
          </div>
          <div class="split-legend">
            <span class="split-legend-flowA">Flow A · ${fmtInt(a)}</span>
            <span class="split-legend-flowB">Flow B · ${fmtInt(b)}</span>
          </div>
        </div>
      `;
    }

    function renderFunnel(w1, cum, post, postNew, delta) {
      return `
        <section class="metric-section">
          <div class="section-header">
            <div class="section-eyebrow">Guardrail · overall_login_success_rate</div>
            <h2 class="section-title">Login completion funnel</h2>
            <p class="section-sub">Distinct devices through assigned → welcome viewed → login succeeded. Bars are scaled per variant (% of that variant's "assigned"), so the SRM doesn't visually distort the comparison. The NEW-only column removes legacy users who already have accounts → cleanest conversion read.</p>
          </div>
          <div class="comparison-grid">
            ${funnelCell('Week 1 · ramp', w1.funnel.steps, w1.funnel.flowA, w1.funnel.flowB, deriveRates(w1.funnel.flowA, w1.funnel.flowB), false)}
            ${funnelCell('Week 2 · cumulative', cum.funnel.steps, cum.funnel.flowA, cum.funnel.flowB, cum.funnel.rates, false)}
            ${funnelCell('Week 2 · post-100% all', post.funnel.steps, post.funnel.flowA, post.funnel.flowB, post.funnel.rates, false)}
            ${funnelCell('Week 2 · NEW only ★', postNew.funnel.steps, postNew.funnel.flowA, postNew.funnel.flowB, postNew.funnel.rates, true)}
          </div>
          ${deltaBlock(delta)}
        </section>
      `;
    }

    function deriveRates(a, b) {
      return {
        flowA: { welcome: (a[1]/a[0]*100), conversion: (a[2]/a[1]*100) },
        flowB: { welcome: (b[1]/b[0]*100), conversion: (b[2]/b[1]*100) }
      };
    }

    function funnelCell(label, steps, a, b, rates, isLatest) {
      // Bars are scaled per variant (% of that variant's "assigned"), so the 73/27 SRM doesn't visually
      // dominate the comparison. Labels live BELOW the bars so they don't overflow at narrow widths.
      const aTotal = a[0] || 1;
      const bTotal = b[0] || 1;
      const rows = steps.map((step, i) => {
        const aPct = (a[i] / aTotal * 100);
        const bPct = (b[i] / bTotal * 100);
        return `
          <div class="funnel-row">
            <div class="funnel-row-step">${step}</div>
            <div class="funnel-bar-cell">
              <div class="funnel-bar-track">
                <div class="funnel-bar-fill funnel-bar-flowA" style="width: ${aPct}%"></div>
              </div>
              <div class="funnel-bar-num flowA-num">${fmtInt(a[i])} <span class="pct-suffix">· ${aPct.toFixed(0)}%</span></div>
            </div>
            <div class="funnel-bar-cell">
              <div class="funnel-bar-track">
                <div class="funnel-bar-fill funnel-bar-flowB" style="width: ${bPct}%"></div>
              </div>
              <div class="funnel-bar-num flowB-num">${fmtInt(b[i])} <span class="pct-suffix">· ${bPct.toFixed(0)}%</span></div>
            </div>
          </div>
        `;
      }).join('');
      const aOverall = (a[2] / a[0] * 100);
      const bOverall = (b[2] / b[0] * 100);
      const winsB = bOverall > aOverall;
      return `
        <div class="compare-cell ${isLatest ? 'is-latest' : ''}">
          <div class="compare-cell-label">${label}</div>
          <div class="funnel-rows">${rows}</div>
          <div class="funnel-rates" style="margin-top: 0.7rem; padding-top: 0.6rem; border-top: 1px solid var(--border); flex-direction: column; gap: 0.3rem;">
            <div style="display: flex; justify-content: space-between; align-items: center; gap: 0.6rem;">
              <span style="font-size: 0.74rem; color: var(--text-muted);">Conv (succ÷welcome)</span>
              <span><span style="color: var(--flow-a); font-family: var(--font-mono);">${fmtPct(rates.flowA.conversion)}</span> <span style="color: var(--text-dim);">·</span> <span style="color: var(--flow-b); font-family: var(--font-mono);">${fmtPct(rates.flowB.conversion)}</span></span>
            </div>
            <div style="display: flex; justify-content: space-between; align-items: center; gap: 0.6rem;">
              <span style="font-size: 0.74rem; color: var(--text-muted);">Overall (succ÷assigned)</span>
              <span><span style="color: var(--flow-a); font-family: var(--font-mono);">${aOverall.toFixed(1)}%</span> <span style="color: var(--text-dim);">·</span> <span style="color: var(--flow-b); font-family: var(--font-mono);">${bOverall.toFixed(1)}%</span> ${winnerBadge(winsB ? 'flowB' : 'flowA')}</span>

      const postDevices = { a: post.variantBalance.snowflake.flowA, b: post.variantBalance.snowflake.flowB };

          <div class="section-header">

          </div>
          ${deltaBlock(deltaForgot)}
          ${deltaBlock(deltaAbandon)}
        </section>
      `;

    function frictionCell(label, events, a, b, devices, isLatest) {
      // Convert raw event counts into "% of variant devices" so the SRM doesn't visually skew the bars.
      // Labels are below bars (not overlay) to keep readable at narrow widths.
      const aRates = a.map(v => (v / devices.a) * 100);
      const bRates = b.map(v => (v / devices.b) * 100);
      const max = Math.max(...aRates, ...bRates, 1);
      const rows = events.map((e, i) => `
        <div class="funnel-row">
          <div class="funnel-row-step">${e}</div>
          <div class="funnel-bar-cell">
            <div class="funnel-bar-track">
              <div class="funnel-bar-fill funnel-bar-flowA" style="width: ${aRates[i]/max*100}%"></div>
            </div>
            <div class="funnel-bar-num flowA-num">${aRates[i].toFixed(1)}% <span class="pct-suffix">· ${fmtInt(a[i])}</span></div>
          </div>
          <div class="funnel-bar-cell">
            <div class="funnel-bar-track">
              <div class="funnel-bar-fill funnel-bar-flowB" style="width: ${bRates[i]/max*100}%"></div>
            </div>
            <div class="funnel-bar-num flowB-num">${bRates[i].toFixed(1)}% <span class="pct-suffix">· ${fmtInt(b[i])}</span></div>
          </div>
        </div>
      `).join('');
      return `
        <div class="compare-cell ${isLatest ? 'is-latest' : ''}">
          <div class="compare-cell-label">${label} <span style="font-weight: 400; opacity: 0.7; letter-spacing: 0;">· devices A=${fmtInt(devices.a)} / B=${fmtInt(devices.b)}</span></div>
          <div class="funnel-rows">${rows}</div>
          <p style="font-size: 0.7rem; color: var(--text-dim); margin: 0.6rem 0 0; font-family: var(--font-mono);">% = events ÷ devices in variant. Lower is better.</p>
        </div>
      `;
    }

        na:    { cls: 'na',    label: 'N/A' }

      return `<span class="winner-badge ${m.cls}">${m.label}</span>`;

        <section class="metric-section">

            <div class="section-eyebrow">→ Next steps</div>

            <div class="compare-cell">

            <div class="section-eyebrow" style="color: var(--warning);">→ Action items · what to do next</div>

            <p class="section-sub">Things to discuss with Tristan / Eric / Yurii based on the conclusions above.</p>
          </div>
          <ul class="questions-list" style="margin: 0;">
            ${items.map(t => `<li style="padding-left: 2.6rem;"><span style="position: absolute; left: 1rem; top: 1rem; width: 22px; height: 22px; border-radius: 4px; background: var(--warning); color: var(--bg-deep); font-weight: 700; font-size: 0.82rem; display: flex; align-items: center; justify-content: center; font-family: var(--font-mono);">→</span><span style="display: block;">${t}</span></li>`).join('')}
          </ul>
        </section>

    function renderHistoricalComparison(hc) {
      const statusBadge = (s) => {
        if (s === 'pending') return '<span class="hist-badge hist-pending">Data pending</span>';
        if (s === 'external-pending') return '<span class="hist-badge hist-external">Waiting on CS team</span>';
        if (s === 'ready') return '<span class="hist-badge hist-ready">Ready</span>';
        return '';
      };
      const blocks = hc.blocks.map(b => {
        const comparison = b.comparison ? renderHistComparison(b.comparison) : '';
        const weekly = b.weeks ? renderHistWeeks(b.weeks, b.title) : '';
        const caveat = b.caveat ? `<p style="font-size: 0.74rem; color: var(--text-dim); font-style: italic; margin: 0.7rem 0 0; line-height: 1.5;">⚠ ${b.caveat}</p>` : '';
        const shopTenure = b.shopTenureBreakdown ? renderShopTenureBreakdown(b.shopTenureBreakdown) : '';
        return `
          <div class="hist-block ${b.highlight ? 'hist-block-highlight' : ''}">
            <div class="hist-block-header">
              <div>
                <div class="hist-block-title">${b.title}</div>
                <p class="hist-block-subtitle">${b.subtitle}</p>
              </div>
              ${statusBadge(b.status)}
            </div>
            ${comparison}
            ${weekly}
            ${shopTenure}
            ${b.pendingNote ? `<div class="hist-pending-note"><span class="hist-pending-label">${b.status === 'external-pending' ? 'Owner' : 'Note'}</span> ${b.owner ? `<strong>${b.owner}</strong> · ` : ''}${b.pendingNote}</div>` : ''}
            ${caveat}
          </div>
        `;
      }).join('');
      return `
        <section class="metric-section">
          <div class="section-header">
            <div class="section-eyebrow" style="color: var(--info);">↺ Historical comparison · vs current experience</div>
            <h2 class="section-title">Pre-experiment baseline</h2>
            <p class="section-sub">${hc.headline}</p>
            ${hc.statusNote ? `<p class="section-sub" style="margin-top: 0.4rem; font-size: 0.82rem; opacity: 0.8;">${hc.statusNote}</p>` : ''}
          </div>
          <div class="hist-blocks">${blocks}</div>
        </section>
      `;
    }

    function renderShopTenureBreakdown(st) {
      const rows = st.rows.map(r => {
        const isLegit = r.label && r.label.toLowerCase().includes('legit');
        return `<tr><td>${r.bucket}</td><td>${fmtInt(r.count)}</td><td>${r.pct}%</td><td style="font-size: 0.76rem; color: ${isLegit ? 'var(--text-dim)' : 'var(--text-muted)'};">${r.label}</td></tr>`;
      }).join('');
      return `
        <details class="hist-details" open style="margin-top: 1rem;">
          <summary><strong style="color: var(--text); font-family: var(--font-sans);">${st.title}</strong></summary>
          <div class="table-scroll" style="margin-top: 0.5rem;">
            <table class="compare-table hist-table">
              <thead><tr><th>Days since shop invitation</th><th>Count</th><th>%</th><th>Note</th></tr></thead>
              <tbody>${rows}</tbody>

          </div>
          <p class="compare-cell-detail" style="margin-top: 0.7rem;">${st.takeaway}</p>
        </details>

    function renderHistComparison(c) {
      const dpClass = c.deltaPct < 0 ? 'delta-down' : c.deltaPct > 0 ? 'delta-up' : 'delta-flat';
      const sign = c.deltaPct > 0 ? '+' : '';
      return `
        <div class="hist-comparison">
          <div class="hist-comp-side">
            <div class="hist-comp-label">${c.preBaseline.label}</div>
            <div class="hist-comp-value">${c.preBaseline.value}</div>
          </div>
          <div class="hist-comp-arrow">
            <div class="hist-delta ${dpClass}">${sign}${c.deltaPct}%</div>
            ${winnerBadge(c.winner)}
          </div>
          <div class="hist-comp-side hist-comp-experiment">
            <div class="hist-comp-label">${c.experiment.label}</div>
            <div class="hist-comp-value">${c.experiment.value}</div>
          </div>
        </div>
        ${c.verdict ? `<div class="hist-verdict">${c.verdict}</div>` : ''}
      `;
    }

    function renderHistWeeks(weeks, title) {
      // Different table shape per metric: detect by available fields
      const hasAccidental = 'accidental' in weeks[0];
      const hasIndies = 'indies' in weeks[0] && 'new_barbers' in weeks[0];
      const hasDup = 'duplicate_pct' in weeks[0];
      const hasBreakdown = 'rental' in weeks[0];
      const hasDevicesOnly = 'devices' in weeks[0] && !hasBreakdown && !hasAccidental && !hasIndies && !hasDup;
      let head, body;
      if (hasDevicesOnly) {
        head = `<th>Week</th><th>Devices</th>`;
        body = weeks.map(w => `<tr class="${w.isExperiment ? 'is-experiment-row' : ''}"><td>${w.week}</td><td>${fmtInt(w.devices)}</td></tr>`).join('');
      } else if (hasAccidental) {
        head = `<th>Week</th><th>Indies (w/ email)</th><th>Accidental</th><th>Accidental %</th>`;
        body = weeks.map(w => `<tr class="${w.isExperiment ? 'is-experiment-row' : ''}"><td>${w.week}</td><td>${fmtInt(w.total_indies)}</td><td>${fmtInt(w.accidental)}</td><td>${w.accidental_pct}%</td></tr>`).join('');
      } else if (hasBreakdown) {
        head = `<th>Week</th><th>Rental</th><th>Commission</th><th>Indies</th><th>Indie %</th>`;
        body = weeks.map(w => {
          const total = w.rental + w.commission + w.indies;
          const sharePct = total > 0 ? (w.indies / total * 100).toFixed(1) : '—';
          return `<tr class="${w.isExperiment ? 'is-experiment-row' : ''}"><td>${w.week}</td><td>${fmtInt(w.rental)}</td><td>${fmtInt(w.commission)}</td><td>${fmtInt(w.indies)}</td><td>${sharePct}%</td></tr>`;
        }).join('');
      } else if (hasDup) {
        head = `<th>Week</th><th>New users</th><th>Dup</th><th>Dup %</th>`;
        body = weeks.map(w => `<tr class="${w.isExperiment ? 'is-experiment-row' : ''}"><td>${w.week}${w.note ? ` <span style="opacity: 0.5; font-size: 0.7rem;">(${w.note})</span>` : ''}</td><td>${fmtInt(w.new_barber_user_ids)}</td><td>${fmtInt(w.duplicates)}</td><td>${w.duplicate_pct}%</td></tr>`).join('');
      } else if (hasIndies) {
        head = `<th>Week</th><th>New barbers</th><th>Indies</th><th>Share</th>`;
        body = weeks.map(w => `<tr class="${w.isExperiment ? 'is-experiment-row' : ''}"><td>${w.week}</td><td>${fmtInt(w.new_barbers)}</td><td>${fmtInt(w.indies)}</td><td>${w.share_pct}%</td></tr>`).join('');
      }
      return `<details class="hist-details" ${weeks.find(w => w.isExperiment) ? 'open' : ''}><summary>Weekly data (${weeks.length} weeks)</summary><div class="table-scroll"><table class="compare-table hist-table"><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table></div></details>`;
    }

    function renderAbandonFollowup(af) {
      const r = af.results;
      return `
        <section class="metric-section">
          <div class="section-header">
            <div class="section-eyebrow" style="color: var(--success);">⚡ Investigation followup · ${af.headline}</div>
            <h2 class="section-title">Did Flow B's email_entry abandoners actually leave?</h2>
            <p class="section-sub">${af.subtitle}</p>
          </div>
          <div class="comparison-grid" style="grid-template-columns: 1fr 1fr;">
            <div class="compare-cell" style="border-left: 3px solid var(--success);">
              <div class="compare-cell-label">Outcome breakdown · post-100% NEW devices</div>
              <p class="compare-cell-stat">${r.total_email_abandoners}<span class="compare-cell-stat-suffix">unique abandoners</span></p>
              <ul style="margin: 0.8rem 0 0; padding: 0; list-style: none; font-family: var(--font-mono); font-size: 0.82rem;">
                <li style="display: flex; justify-content: space-between; padding: 0.4rem 0; border-bottom: 1px solid var(--border);"><span style="color: var(--success);">↩ Came back & logged in</span><strong>${r.later_logged_in.count} · ${r.later_logged_in.pct}%</strong></li>
                <li style="display: flex; justify-content: space-between; padding: 0.4rem 0; border-bottom: 1px solid var(--border);"><span style="color: var(--success);">↩ Came back & signed up</span><strong>${r.later_signed_up.count} · ${r.later_signed_up.pct}%</strong></li>
                <li style="display: flex; justify-content: space-between; padding: 0.4rem 0; border-bottom: 1px solid var(--border);"><span style="color: var(--info);">↻ Came back, no outcome yet</span><strong>${r.came_back_no_outcome.count} · ${r.came_back_no_outcome.pct}%</strong></li>
                <li style="display: flex; justify-content: space-between; padding: 0.4rem 0;"><span style="color: var(--danger);">✗ Truly lost</span><strong>${r.truly_lost.count} · ${r.truly_lost.pct}%</strong></li>
              </ul>
            </div>
            <div class="compare-cell">
              <div class="compare-cell-label">Implication</div>
              <p style="font-size: 0.88rem; color: var(--text); line-height: 1.55; margin: 0.4rem 0 0.8rem;">${af.implication}</p>
              <div class="hypothesis-card" style="margin-top: 0.7rem;">
                <div class="hypothesis-header">
                  <span class="hypothesis-badge" style="background: var(--success);">Verdict</span>
                </div>
                <p class="hypothesis-tldr">${af.verdict}</p>
              </div>
            </div>
          </div>
          <div class="hist-pending-note" style="margin-top: 0.8rem;">
            <span class="hist-pending-label">Method</span> ${af.method}
          </div>
          ${af.caveat ? `<p style="font-size: 0.74rem; color: var(--text-dim); font-style: italic; margin: 0.7rem 0 0; line-height: 1.5;">⚠ ${af.caveat}</p>` : ''}
        </section>
      `;
    }

    function renderConclusions(items) {
      // Each conclusion needs: question, tldr (short), bullets (3-4), evidence
      const cards = items.map(c => {
        const tldr = c.tldr || c.answer.split('.')[0] + '.';
        const bullets = c.bullets || [];
        const bulletsHtml = bullets.length
          ? `<ul class="conclusion-bullets">${bullets.map(b => `<li>${b}</li>`).join('')}</ul>`
          : `<p class="conclusion-fallback-body">${c.answer}</p>`;
        return `
          <div class="conclusion-card">
            <div class="conclusion-card-question">${c.question}</div>
            <div class="conclusion-card-tldr">
              <span class="tldr-badge">TL;DR</span>
              <span class="tldr-text">${tldr}</span>
            </div>
            ${bulletsHtml}
            <div class="conclusion-card-evidence">
              <span class="evidence-label">Evidence</span>
              <span class="evidence-text">${c.evidence}</span>
            </div>
          </div>
        `;
      }).join('');
      return `
        <section class="metric-section">
          <div class="section-header">
            <div class="section-eyebrow" style="color: var(--success);">✓ Conclusions · investigation outcomes</div>
            <h2 class="section-title">What we now know</h2>
            <p class="section-sub">Questions investigated this session, with evidence. Click through the deep-dive sections below for the underlying data.</p>
          </div>
          <div class="conclusion-grid">${cards}</div>
        </section>
      `;
    }

    function renderForgotPasswordInvestigation(fp) {
      const rows = fp.rows.map(r => `
        <tr><td>${r.window}</td><td>${fmtInt(r.events)}</td><td>${fmtInt(r.users)}</td><td><strong>${r.taps_per_user}</strong></td></tr>
      `).join('');
      return `
        <section class="metric-section">
          <div class="section-header">
            <div class="section-eyebrow">⚙ Forgot password investigation · May 8</div>
            <h2 class="section-title">Is the Flow A frustration tapping a legacy artifact?</h2>
            <p class="section-sub">${fp.headline}</p>
          </div>
          <div class="comparison-grid" style="grid-template-columns: 1fr;">
            <div class="compare-cell is-latest">
              <div class="compare-cell-label">Flow A · flow_a_sheet · taps per user</div>
              <table class="compare-table" style="margin-top: 0.4rem;">
                <thead><tr><th>Window</th><th>Events</th><th>Users</th><th>Taps / user</th></tr></thead>
                <tbody>${rows}</tbody>
              </table>
              <p class="compare-cell-detail" style="margin-top: 0.7rem;">${fp.takeaway}</p>
            </div>
          </div>
        </section>
      `;
    }

    function renderIndieChannelInvestigation(ic) {
      const bucketRows = ic.newIndiesByBucket.rows.map(r => `
        <tr><td>${r.bucket}</td><td><strong>${fmtInt(r.indie_users)}</strong></td></tr>
      `).join('');
      const overlap = ic.overlapWithExperiment;
      return `
        <section class="metric-section">
          <div class="section-header">
            <div class="section-eyebrow">⚙ Indie channel investigation · May 8</div>
            <h2 class="section-title">Where do indies actually sign up?</h2>

          </div>
          <div class="comparison-grid">
            <div class="compare-cell">
              <div class="compare-cell-label">New indies · by first-seen bucket (last 90d)</div>

                <thead><tr><th>Bucket</th><th>Users</th></tr></thead>
                <tbody>${bucketRows}</tbody>
              </table>
              <p class="compare-cell-detail" style="margin-top: 0.7rem;">69 indies first appeared in IDENTIFIES during the experiment window (Apr 30+). Pre-experiment indies are pre-existing accounts.</p>
            </div>
            <div class="compare-cell is-latest">
              <div class="compare-cell-label">⚠ Overlap with experiment population</div>
              <p class="compare-cell-stat">${overlap.indiesInExperimentPop}<span class="compare-cell-stat-suffix">of ${overlap.totalNewIndies} new indies in the experiment pop</span></p>
              <p class="compare-cell-detail" style="margin-top: 0.7rem;">Only 1 in flowA + 1 in flowB. The other ${overlap.indiesNotInExperimentPop} indies (97%) never fired LOGIN_EXPERIMENT_ASSIGNED.</p>
            </div>
          </div>
          <div class="delta-block" style="border-left-color: var(--warning);">
            <div class="delta-block-label" style="color: var(--warning);">Implication for the experiment</div>
            <p>${ic.takeaway}</p>
          </div>
        </section>
      `;
    }

    function renderResolvedSection(items) {
      return `
        <section class="metric-section">
          <div class="section-header">
            <div class="section-eyebrow" style="color: var(--success);">✓ Resolved this session · cleared off</div>
            <h2 class="section-title">Things we figured out</h2>
            <p class="section-sub">Questions from Week 1 we now have answers for. Removed from open questions to keep the tracker current.</p>
          </div>
          <ul class="questions-list" style="margin: 0;">
            ${items.map(t => `<li style="padding-left: 2.6rem;"><span style="position: absolute; left: 1rem; top: 1rem; width: 22px; height: 22px; border-radius: 50%; background: var(--success); color: var(--bg-deep); font-weight: 700; font-size: 0.82rem; display: flex; align-items: center; justify-content: center; font-family: var(--font-mono);">✓</span><span style="display: block; padding-left: 0;">${t}</span></li>`).join('')}
          </ul>
        </section>
      `;
    }

    function renderSrmInvestigation(srm) {
      const byDay = srm.byDay.rows.map(r => `
        <tr><td>${r.day}</td><td>${fmtInt(r.flowA_devices)}</td><td>${fmtInt(r.flowB_devices)}</td><td>${r.split}</td></tr>
      `).join('');
      const byVer = srm.byAppVersion.rows.map(r => `
        <tr><td>${r.variant}</td><td>${r.version}</td><td>${fmtInt(r.devices)}</td><td>${fmtInt(r.events)}</td></tr>
      `).join('');
      const lr = srm.loginRate.rows.map(r => `
        <tr><td style="color: var(--${r.variant === 'flowA' ? 'flow-a' : 'flow-b'});">${r.variant}</td><td>${fmtInt(r.devices)}</td><td>${fmtInt(r.logged_in_users)}</td><td>${fmtInt(r.actors)}</td><td><strong>${r.login_rate_pct}%</strong></td></tr>
      `).join('');
      const fs = srm.byFirstSeen.rows.map(r => {
        const isPost = r.first_seen.includes('Post-100');
        return `<tr ${isPost ? 'style="background: var(--accent-soft);"' : ''}><td>${r.first_seen}</td><td>${fmtInt(r.flowA)}</td><td>${fmtInt(r.flowB)}</td><td><strong>${r.split}</strong></td><td style="font-size: 0.78rem;">${r.interpretation}</td></tr>`;
      }).join('');
      const ctx = srm.iosFiringContext;
      const ctxList = ctx.contexts.map(c => `<li style="font-family: var(--font-mono); font-size: 0.78rem;">${c}</li>`).join('');
      return `
        <section class="metric-section">
          <div class="section-header">
            <div class="section-eyebrow" style="color: var(--success);">✓ SRM root-caused · May 8</div>
            <h2 class="section-title">Why is the split 73/27 in post-100%?</h2>
            <p class="section-sub">${srm.headline}</p>
          </div>

          <div class="comparison-grid" style="grid-template-columns: 1fr; margin-bottom: 1.4rem;">
            <div class="compare-cell is-latest">
              <div class="compare-cell-label">⚙ Root cause · device-age stratification</div>
              <p style="font-size: 0.95rem; color: var(--text); margin: 0.4rem 0 0.8rem;">${srm.byFirstSeen.headline}</p>
              <div class="table-scroll">
                <table class="compare-table" style="margin-top: 0.4rem;">
                  <thead><tr><th>First seen</th><th class="flowA">Flow A</th><th class="flowB">Flow B</th><th>Split</th><th>Interpretation</th></tr></thead>
                  <tbody>${fs}</tbody>
                </table>
              </div>
              <p class="compare-cell-detail" style="margin-top: 0.8rem;">${srm.byFirstSeen.takeaway}</p>
            </div>
          </div>

          <div class="comparison-grid">
            <div class="compare-cell">
              <div class="compare-cell-label">iOS code review · firing site</div>
              <p style="font-size: 0.85rem; color: var(--text); margin: 0.3rem 0 0.5rem;">${ctx.headline}</p>
              <p class="compare-cell-detail" style="font-family: var(--font-mono); font-size: 0.72rem;"><code>${ctx.filePath}</code></p>
              <p class="compare-cell-detail" style="margin-top: 0.5rem;"><strong>Fires when AuthorizationFlowCoordinator starts in:</strong></p>
              <ul style="margin: 0.3rem 0 0.7rem; padding-left: 1.2rem; color: var(--text-muted);">${ctxList}</ul>
              <p class="compare-cell-detail">${ctx.takeaway}</p>
            </div>
            <div class="compare-cell">
              <div class="compare-cell-label">Stability + version + login_rate · supporting data</div>
              <p style="font-size: 0.74rem; color: var(--text-muted); margin: 0.4rem 0 0.3rem;">By day:</p>
              <table class="compare-table"><thead><tr><th>Day</th><th class="flowA">A</th><th class="flowB">B</th><th>Split</th></tr></thead><tbody>${byDay}</tbody></table>
              <p style="font-size: 0.74rem; color: var(--text-muted); margin: 0.6rem 0 0.3rem;">By version:</p>
              <table class="compare-table"><thead><tr><th>V</th><th>Ver</th><th>Devices</th><th>Events</th></tr></thead><tbody>${byVer}</tbody></table>
              <p style="font-size: 0.74rem; color: var(--text-muted); margin: 0.6rem 0 0.3rem;">login_rate:</p>
              <table class="compare-table"><thead><tr><th>V</th><th>Devices</th><th>Logged-in</th><th>Actors</th><th>Rate</th></tr></thead><tbody>${lr}</tbody></table>
            </div>
          </div>
        </section>
      `;
    }

    function renderTempPasswordInvestigation(tp) {
      const rvp = tp.rampVsPost100.rows;
      const ramp = rvp.filter(r => r.window.startsWith('ramp'));
      const post = rvp.filter(r => r.window.startsWith('post'));
      const tableRows = (rows) => rows.map(r => `
        <tr><td>${r.result}</td><td>${fmtInt(r.events)}</td><td>${fmtInt(r.users)}</td><td><strong>${r.pct}%</strong></td></tr>
      `).join('');
      const itRows = tp.inputTypeMix.rows.map(r => `
        <tr><td>${r.window}</td><td>${r.input_type}</td><td>${fmtInt(r.events)}</td><td><strong>${r.pct}%</strong></td></tr>
      `).join('');
      // Hypothesis card — bullets extracted from row data
      const tempRamp = ramp.find(r => r.result === 'temp_password');
      const tempPost = post.find(r => r.result === 'temp_password');
      const retRamp = ramp.find(r => r.result === 'returning');
      const retPost = post.find(r => r.result === 'returning');
      const hypothesisBullets = [
        `Ramp temp_password: <strong>${tempRamp.pct}%</strong> (${tempRamp.events} events / ${tempRamp.users} users)`,
        `Post-100% temp_password: <strong>${tempPost.pct}%</strong> (${tempPost.events} events / ${tempPost.users} users) — drop of ${(tempRamp.pct - tempPost.pct).toFixed(1)} pp`,
        `Returning share rose <strong>${retRamp.pct}% → ${retPost.pct}%</strong> (consistent with backlog being consumed)`,
        `Sample post-100% is small (${tempPost.users} users in 1.5 days) — confirm at week 3`
      ];
      return `
        <section class="metric-section">
          <div class="section-header">
            <div class="section-eyebrow">⚙ temp_password investigation · May 8</div>
            <h2 class="section-title">Why did temp_password share drop?</h2>
            <p class="section-sub">${tp.headline}</p>
          </div>
          <div class="comparison-grid">
            <div class="compare-cell">
              <div class="compare-cell-label">Ramp · Apr 30 → May 6</div>
              <div class="table-scroll">
                <table class="compare-table" style="margin-top: 0.4rem;">
                  <thead><tr><th>Result</th><th>Events</th><th>Users</th><th>%</th></tr></thead>
                  <tbody>${tableRows(ramp)}</tbody>
                </table>
              </div>
            </div>
            <div class="compare-cell is-latest">
              <div class="compare-cell-label">Post-100% · May 7+</div>
              <div class="table-scroll">
                <table class="compare-table" style="margin-top: 0.4rem;">
                  <thead><tr><th>Result</th><th>Events</th><th>Users</th><th>%</th></tr></thead>
                  <tbody>${tableRows(post)}</tbody>
                </table>
              </div>
            </div>
            <div class="compare-cell">
              <div class="compare-cell-label">Input type mix</div>
              <div class="table-scroll">
                <table class="compare-table" style="margin-top: 0.4rem;">
                  <thead><tr><th>Window</th><th>Type</th><th>Events</th><th>%</th></tr></thead>
                  <tbody>${itRows}</tbody>
                </table>
              </div>
              <p class="compare-cell-detail" style="margin-top: 0.7rem;">${tp.inputTypeMix.takeaway}</p>
            </div>
          </div>
          ${renderHypothesisCard('Backlog catch-up', 'The ramp caught a backlog of invited barbers who had been holding temp_password emails for days/weeks before exposure to Flow B. Post-100% reflects steady-state organic mix.', hypothesisBullets)}
        </section>
      `;
    }

    function renderHypothesisCard(label, tldr, bullets) {
      const items = bullets.map(b => `<li>${b}</li>`).join('');
      return `
        <div class="hypothesis-card">
          <div class="hypothesis-header">
            <span class="hypothesis-badge">Hypothesis</span>
            <span class="hypothesis-label">${label}</span>
          </div>
          <p class="hypothesis-tldr">${tldr}</p>
          <ul class="hypothesis-bullets">${items}</ul>
        </div>
      `;
    }

    function renderIndieClassification(ic) {
      const fa = ic.experimentBreakdown.byVariant.flowA;
      const fb = ic.experimentBreakdown.byVariant.flowB;
      const total = ic.experimentBreakdown.totalNewBarbers;
      return `
        <section class="metric-section indie-callout">
          <div class="section-header">
            <div class="section-eyebrow" style="color: var(--success);">⚡ Findings from May 8 · investigation</div>
            <h2 class="section-title">How are indies tagged? — answer to Tristan's question</h2>
            <p class="section-sub">${ic.headline}</p>
          </div>
          <div class="comparison-grid">
            <div class="compare-cell">
              <div class="compare-cell-label">Indie identifier · canonical</div>
              <p style="font-family: var(--font-mono); font-size: 0.85rem; color: var(--text); line-height: 1.55; margin: 0;">
                <code style="color: var(--accent-bright);">CONTEXT_TRAITS_ROLE = 'barber'</code><br>
                <code style="color: var(--text-muted);">AND</code><br>
                <code style="color: var(--accent-bright);">CONTEXT_TRAITS_USER_TYPE IS NULL</code>
              </p>
              <p class="compare-cell-detail">Rental and Commission are explicit user_types for shop-employed barbers. Indies have no shop relationship → no user_type set.</p>
            </div>
            <div class="compare-cell is-latest">
              <div class="compare-cell-label">Experiment window · Apr 30 → May 8</div>
              <p class="compare-cell-stat">${total}<span class="compare-cell-stat-suffix">new barbers · 0 indies</span></p>
              <table class="compare-table" style="margin-top: 0.6rem;">
                <thead><tr><th>Type</th><th class="flowA">Flow A</th><th class="flowB">Flow B</th></tr></thead>
                <tbody>
                  <tr><td>Rental</td><td>${fa.rental}</td><td>${fb.rental}</td></tr>
                  <tr><td>Commission</td><td>${fa.commission}</td><td>${fb.commission}</td></tr>
                  <tr class="zero-row"><td>Indie</td><td>${fa.indie}</td><td>${fb.indie}</td></tr>
                </tbody>
              </table>
            </div>
          </div>
          <div class="delta-block" style="border-left-color: var(--success);">
            <div class="delta-block-label" style="color: var(--success);">temp_password ≠ indie · correction</div>
            <p>${ic.tempPasswordCorrection.reality}</p>
          </div>
          <div class="delta-block">
            <div class="delta-block-label">Global context</div>
            <p>${ic.globalContext.interpretation}</p>
          </div>
          <ul class="questions-list" style="margin-top: 1rem;">
            ${ic.implications.map(i => `<li>${i}</li>`).join('')}
          </ul>
        </section>
      `;
    }

    function deltaBlock(d) {
      if (!d) return '';
      // New richer format: tldr + bullets + verdict badge + winner badge
      // Falls back to delta_takeaway paragraph if not migrated.
      if (d.tldr && d.bullets) {
        const verdictMap = {
          winner:    { label: 'Winner',         cls: 'verdict-winner' },
          explained: { label: 'Explained',      cls: 'verdict-explained' },
          caveat:    { label: 'Caveat',         cls: 'verdict-caveat' },
          'ux-issue':{ label: 'UX issue',       cls: 'verdict-uxissue' },
          watch:     { label: 'Watch',          cls: 'verdict-watch' },
          bug:       { label: 'Bug · pending fix', cls: 'verdict-bug' }
        };
        const v = verdictMap[d.verdict] || { label: d.verdict || 'Note', cls: 'verdict-watch' };
        const bullets = d.bullets.map(b => `<li>${b}</li>`).join('');
        const winnerHtml = d.winner ? winnerBadge(d.winner) : '';
        return `
          <div class="delta-card">
            <div class="delta-header">
              <span class="delta-metric-label">Δ ${d.metric}</span>
              <span class="delta-verdict-badge ${v.cls}">${v.label}</span>
              ${winnerHtml}
            </div>
            <p class="delta-tldr">${d.tldr}</p>
            <ul class="delta-bullets">${bullets}</ul>
          </div>
        `;
      }
      // Legacy fallback
      return `
        <div class="delta-block">
          <div class="delta-block-label">Delta · ${d.metric}</div>
          <p>${d.delta_takeaway || ''}</p>
        </div>
      `;
    }

    load().catch(err => {
      console.error(err);
      document.getElementById('content').innerHTML = `<div class="loading">Failed to load snapshots: ${err.message}</div>`;
    });
  </script>
</body>
