<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Onboarding Experiment · Tracker</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600&display=swap"
    rel="stylesheet"
  />

  <style>
    :root {
      --bg-base: #07091a;
      --bg-deep: #050714;
      --bg-surface: #0f1328;
      --bg-elevated: #181c34;
      --bg-glass: rgba(20, 24, 48, 0.55);

      --border: rgba(255, 255, 255, 0.06);
      --border-strong: rgba(255, 255, 255, 0.14);
      --border-warm: rgba(249, 115, 22, 0.18);

      --text: #f5f7ff;
      --text-muted: #9aa3c2;
      --text-dim: #5b6486;

      --accent: #f97316;
      --accent-bright: #fb923c;
      --accent-deep: #c2410c;
      --accent-soft: rgba(249, 115, 22, 0.14);

      --flow-a: #60a5fa;
      --flow-a-soft: rgba(96, 165, 250, 0.14);
      --flow-b: #f97316;
      --flow-b-soft: rgba(249, 115, 22, 0.14);

      --success: #4ade80;
      --warning: #fbbf24;
      --danger: #f87171;
      --info: #38bdf8;

      --font-sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      --font-display: "Instrument Serif", "Times New Roman", Georgia, serif;
      --font-mono: "JetBrains Mono", "SF Mono", Menlo, Monaco, monospace;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: var(--font-sans);
      background: var(--bg-base);
      color: var(--text);
      letter-spacing: -0.011em;
      min-height: 100vh;
    }

    /* Ambient grid */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px);
      background-size: 64px 64px;
      mask-image: radial-gradient(ellipse 80% 70% at 50% 50%, black 30%, transparent 100%);
      -webkit-mask-image: radial-gradient(ellipse 80% 70% at 50% 50%, black 30%, transparent 100%);
      opacity: 0.5;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 3rem 2rem 6rem;
      position: relative;
      z-index: 1;
    }

    /* Header */
    header.tracker-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 2rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 3rem;
    }

    .header-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.6rem;
    }
    .header-eyebrow::before {
      content: "";
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 12px var(--accent);
    }

    h1.tracker-title {
      margin: 0;
      font-family: var(--font-sans);
      font-weight: 700;
      font-size: 2.6rem;
      letter-spacing: -0.028em;
      line-height: 1.1;
    }
    h1.tracker-title em {
      font-family: var(--font-display);
      font-style: italic;
      font-weight: 400;
      color: var(--accent);
    }

    .tracker-sub {
      color: var(--text-muted);
      font-size: 1rem;
      margin: 0.6rem 0 0;
      max-width: 60ch;
    }

    .header-nav {
      display: flex;
      gap: 0.6rem;
      flex-shrink: 0;
    }
    .last-updated {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.55rem 0.9rem;
      font-size: 0.78rem;
      font-family: var(--font-mono);
      color: var(--text-muted);
      background: var(--bg-surface);
      border: 1px solid var(--border-strong);
      border-radius: 6px;
      letter-spacing: 0.02em;
    }
    .last-updated strong {
      color: var(--text);
      font-weight: 600;
    }
    .last-updated-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 8px var(--success);
    }

    /* Snapshot meta strip */
    .meta-strip {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin-bottom: 3rem;
    }
    .meta-cell {
      padding: 1rem 1.2rem;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 8px;
    }
    .meta-cell.is-latest {
      border-color: var(--accent);
      background: var(--accent-soft);
    }
    .meta-cell-eyebrow {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 0.4rem;
    }
    .meta-cell.is-latest .meta-cell-eyebrow { color: var(--accent); }
    .meta-cell-title {
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--text);
      margin: 0 0 0.3rem;
    }
    .meta-cell-detail {
      font-size: 0.82rem;
      color: var(--text-muted);
      margin: 0;
      line-height: 1.5;
    }
    .meta-cell-detail code {
      font-family: var(--font-mono);
      font-size: 0.78rem;
      color: var(--accent-bright);
    }

    /* Section */
    section.metric-section {
      margin-bottom: 3.5rem;
    }
    .section-header {
      margin-bottom: 1.4rem;
    }
    .section-eyebrow {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 0.4rem;
    }
    .section-title {
      font-size: 1.4rem;
      font-weight: 600;
      margin: 0 0 0.4rem;
      letter-spacing: -0.02em;
    }
    .section-sub {
      font-size: 0.92rem;
      color: var(--text-muted);
      margin: 0;
      max-width: 80ch;
      line-height: 1.55;
    }

    /* Comparison grid */
    .comparison-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin-bottom: 1.4rem;
    }
    .compare-cell {
      padding: 1.2rem 1.3rem;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      position: relative;
    }
    .compare-cell.is-latest {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent-soft) inset;
    }
    .compare-cell-label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 0.7rem;
    }
    .compare-cell.is-latest .compare-cell-label {
      color: var(--accent);
    }
    .compare-cell-stat {
      font-family: var(--font-display);
      font-size: 2.6rem;
      line-height: 1;
      font-weight: 400;
      color: var(--text);
      margin: 0;
      letter-spacing: -0.01em;
    }
    .compare-cell-stat-suffix {
      font-family: var(--font-sans);
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-left: 0.4rem;
      font-weight: 500;
    }
    .compare-cell-detail {
      font-size: 0.82rem;
      color: var(--text-muted);
      margin: 0.7rem 0 0;
      line-height: 1.5;
    }
    .compare-cell-detail code {
      font-family: var(--font-mono);
      font-size: 0.76rem;
      color: var(--accent-bright);
    }

    /* Bar chart (variant split) */
    .split-bar {
      display: flex;
      width: 100%;
      height: 8px;
      border-radius: 4px;
      overflow: hidden;
      margin: 0.6rem 0 0.4rem;
      background: rgba(255,255,255,0.04);
    }
    .split-bar-flowA { background: var(--flow-a); }
    .split-bar-flowB { background: var(--flow-b); }
    .split-legend {
      display: flex;
      justify-content: space-between;
      font-size: 0.74rem;
      color: var(--text-muted);
      font-family: var(--font-mono);
    }
    .split-legend-flowA { color: var(--flow-a); }
    .split-legend-flowB { color: var(--flow-b); }

    /* Funnel */
    .funnel-rows {
      display: grid;
      gap: 0.4rem;
    }
    .funnel-row {
      display: grid;
      grid-template-columns: 110px 1fr 1fr;
      gap: 0.6rem;
      align-items: center;
    }
    .funnel-row-step {
      font-size: 0.76rem;
      color: var(--text-muted);
      font-family: var(--font-mono);
    }
    .funnel-bar-track {
      position: relative;
      height: 22px;
      background: rgba(255,255,255,0.04);
      border-radius: 4px;
      overflow: hidden;
    }
    .funnel-bar-fill {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      border-radius: 4px;
    }
    .funnel-bar-flowA { background: var(--flow-a); }
    .funnel-bar-flowB { background: var(--flow-b); }
    .funnel-bar-label {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.74rem;
      font-family: var(--font-mono);
      color: var(--text);
      font-weight: 600;
      mix-blend-mode: difference;
    }
    .funnel-rates {
      display: flex;
      gap: 1.2rem;
      margin-top: 0.6rem;
      font-size: 0.78rem;
      color: var(--text-muted);
    }
    .funnel-rates strong {
      color: var(--text);
      font-family: var(--font-mono);
    }

    /* North star table */
    table.compare-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.86rem;
    }
    table.compare-table th {
      text-align: left;
      padding: 0.5rem 0.7rem;
      font-weight: 600;
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
      border-bottom: 1px solid var(--border-strong);
    }
    table.compare-table th.flowA { color: var(--flow-a); }
    table.compare-table th.flowB { color: var(--flow-b); }
    table.compare-table td {
      padding: 0.6rem 0.7rem;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      font-family: var(--font-mono);
      font-size: 0.85rem;
    }
    table.compare-table td:first-child {
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 0.86rem;
    }
    table.compare-table tr.zero-row td:not(:first-child) {
      color: var(--text-dim);
      opacity: 0.6;
    }

    /* Email check distribution bar */
    .donut-stack {
      display: flex;
      width: 100%;
      height: 32px;
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 0.8rem;
    }
    .donut-seg {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.74rem;
      font-weight: 600;
      color: var(--text);
      font-family: var(--font-mono);
      mix-blend-mode: difference;
    }
    .donut-seg-temp { background: var(--accent); }
    .donut-seg-returning { background: var(--flow-a); }
    .donut-seg-new { background: var(--success); }
    .donut-seg-username { background: var(--text-dim); }
    .donut-legend {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.4rem 1rem;
      font-size: 0.76rem;
      color: var(--text-muted);
    }
    .donut-legend-row { display: flex; align-items: center; gap: 0.4rem; }
    .donut-legend-dot {
      width: 8px; height: 8px; border-radius: 50%;
    }

    /* Delta block */
    .delta-block {
      margin-top: 1rem;
      padding: 0.9rem 1.1rem;
      background: var(--bg-elevated);
      border-left: 3px solid var(--accent);
      border-radius: 0 6px 6px 0;
    }
    .delta-block-label {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.3rem;
    }
    .delta-block p {
      margin: 0;
      font-size: 0.88rem;
      color: var(--text);
      line-height: 1.55;
    }

    /* Open questions */
    .questions-list {
      margin: 0;
      padding: 0;
      list-style: none;
    }
    .questions-list li {
      padding: 1rem 1.2rem;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 0.6rem;
      font-size: 0.92rem;
      color: var(--text);
      line-height: 1.55;
      position: relative;
      padding-left: 2.6rem;
    }
    .questions-list li::before {
      content: "?";
      position: absolute;
      left: 1rem;
      top: 1rem;
      width: 22px; height: 22px;
      border-radius: 50%;
      background: var(--accent);
      color: var(--bg-deep);
      font-weight: 700;
      font-size: 0.82rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-mono);
    }

    .leak-status {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.3rem 0.7rem;
      border-radius: 4px;
      font-size: 0.76rem;
      font-weight: 600;
      font-family: var(--font-mono);
    }
    .leak-status.is-active {
      background: rgba(248, 113, 113, 0.14);
      color: var(--danger);
      border: 1px solid rgba(248, 113, 113, 0.3);
    }

    .loading {
      padding: 4rem 2rem;
      text-align: center;
      color: var(--text-muted);
      font-size: 1rem;
    }

    @media (max-width: 880px) {
      .comparison-grid, .meta-strip { grid-template-columns: 1fr; }
      .funnel-row { grid-template-columns: 1fr; }
      header.tracker-header { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="tracker-header">
      <div>
        <span class="header-eyebrow">Experiment Tracker · post-100% rollout</span>
        <h1 class="tracker-title">Login A/B · <em>evolution</em></h1>
        <p class="tracker-sub">Tracking how the SQR-6510 login experiment metrics evolve as new data accrues. Snapshots compared side-by-side, with deltas and open questions per metric.</p>
      </div>
      <div class="header-nav">
        <span id="last-updated-badge" class="last-updated">
          <span class="last-updated-dot"></span>
          Data through <strong id="last-updated-date">—</strong>
        </span>
      </div>
    </header>

    <div id="meta" class="meta-strip"></div>

    <main id="content" class="loading">Loading snapshots…</main>
  </div>

  <script>
    const SNAPSHOT_FILES = [
      { date: '2026-05-06', file: '../data/2026-05-06.json' },
      { date: '2026-05-08', file: '../data/2026-05-08.json' }
    ];

    async function load() {
      const data = await Promise.all(SNAPSHOT_FILES.map(s =>
        fetch(s.file).then(r => r.json()).then(json => ({ ...s, json }))
      ));
      render(data);
    }

    function fmtPct(n) { return (n == null || isNaN(n)) ? '—' : n.toFixed(1) + '%'; }
    function fmtInt(n) { return (n == null || isNaN(n)) ? '—' : Math.round(n).toLocaleString(); }

    function render(snapshots) {
      const week1 = snapshots.find(s => s.date === '2026-05-06').json;
      const week2 = snapshots.find(s => s.date === '2026-05-08').json;
      const cum = week2.windows.cumulative;
      const post = week2.windows.postRollout;

      // Last-updated badge — show latest snapshot date
      const latestDate = snapshots.map(s => s.date).sort().pop();
      const formatted = new Date(latestDate + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      document.getElementById('last-updated-date').textContent = formatted;

      // Meta strip
      const metaEl = document.getElementById('meta');
      metaEl.innerHTML = `
        <div class="meta-cell">
          <div class="meta-cell-eyebrow">Snapshot · Week 1</div>
          <h3 class="meta-cell-title">${week1.weekOf} · ramp window</h3>
          <p class="meta-cell-detail">Apr 30 → May 6 · phased rollout (1% → 50%). Source: <code>data/2026-05-06.json</code></p>
        </div>
        <div class="meta-cell is-latest">
          <div class="meta-cell-eyebrow">Snapshot · Week 2 cumulative</div>
          <h3 class="meta-cell-title">${cum.windowStart} → ${cum.windowEnd}</h3>
          <p class="meta-cell-detail">Cumulative since experiment start (~${cum.approxDays} days). Includes ramp + 100% rollout. Source: <code>data/2026-05-08.json</code></p>
        </div>
        <div class="meta-cell is-latest">
          <div class="meta-cell-eyebrow">Snapshot · Week 2 post-100%</div>
          <h3 class="meta-cell-title">${post.windowStart} → ${post.windowEnd}</h3>
          <p class="meta-cell-detail">Post-rollout subset (~${post.approxDays} days at full traffic). Cleanest read of equilibrium behavior.</p>
        </div>
      `;

      const sections = [];

      // === 1. Variant balance ===
      sections.push(renderVariantBalance(week1, cum, post, week2.deltas.vsWeek1Snapshot.notes[0]));

      // === 2. Funnel ===
      sections.push(renderFunnel(week1, cum, post, week2.deltas.vsWeek1Snapshot.notes[1]));

      // === 3. Email check ===
      sections.push(renderEmailCheck(week1, cum, post, week2.deltas.vsWeek1Snapshot.notes[2]));

      // === 4. North star ===
      sections.push(renderNorthStar(week1, cum, post, week2.deltas.vsWeek1Snapshot.notes[7]));

      // === 5. Per-exposure ===
      sections.push(renderPerExposure(week1, cum, post, week2.deltas.vsWeek1Snapshot.notes[3]));

      // === 6. Friction ===
      sections.push(renderFriction(week1, cum, post,
        week2.deltas.vsWeek1Snapshot.notes[4],
        week2.deltas.vsWeek1Snapshot.notes[5]));

      // === 7. Scope leak ===
      sections.push(renderScopeLeak(cum, post, week2.deltas.vsWeek1Snapshot.notes[6]));

      // === 8. Open questions ===
      sections.push(renderOpenQuestions(week2.openQuestions));

      const content = document.getElementById('content');
      content.classList.remove('loading');
      content.innerHTML = sections.join('');
    }

    function renderVariantBalance(w1, cum, post, delta) {
      const w1Total = w1.variantBalance.snowflake.flowA + w1.variantBalance.snowflake.flowB;
      const w1A = (w1.variantBalance.snowflake.flowA / w1Total * 100).toFixed(1);
      const w1B = (w1.variantBalance.snowflake.flowB / w1Total * 100).toFixed(1);

      const cumA = cum.variantBalance.splitPct.flowA;
      const cumB = cum.variantBalance.splitPct.flowB;
      const postA = post.variantBalance.splitPct.flowA;
      const postB = post.variantBalance.splitPct.flowB;

      return `
        <section class="metric-section">
          <div class="section-header">
            <div class="section-eyebrow">Health check · SRM</div>
            <h2 class="section-title">Variant balance — should be 50/50</h2>
            <p class="section-sub">Distinct devices LaunchDarkly assigned to each variant (LOGIN_EXPERIMENT_ASSIGNED). A persistent split off 50/50 means downstream comparisons are biased.</p>
          </div>
          <div class="comparison-grid">
            ${variantCell('Week 1 · ramp', w1.variantBalance.snowflake.flowA, w1.variantBalance.snowflake.flowB, w1A, w1B, false)}
            ${variantCell('Week 2 · cumulative', cum.variantBalance.snowflake.flowA, cum.variantBalance.snowflake.flowB, cumA, cumB, true)}
            ${variantCell('Week 2 · post-100%', post.variantBalance.snowflake.flowA, post.variantBalance.snowflake.flowB, postA, postB, true)}
          </div>
          ${deltaBlock(delta)}
        </section>
      `;
    }

    function variantCell(label, a, b, aPct, bPct, isLatest) {
      return `
        <div class="compare-cell ${isLatest ? 'is-latest' : ''}">
          <div class="compare-cell-label">${label}</div>
          <p class="compare-cell-stat">${aPct}<span class="compare-cell-stat-suffix">/ ${bPct}</span></p>
          <div class="split-bar">
            <div class="split-bar-flowA" style="width: ${aPct}%"></div>
            <div class="split-bar-flowB" style="width: ${bPct}%"></div>
          </div>
          <div class="split-legend">
            <span class="split-legend-flowA">Flow A · ${fmtInt(a)}</span>
            <span class="split-legend-flowB">Flow B · ${fmtInt(b)}</span>
          </div>
        </div>
      `;
    }

    function renderFunnel(w1, cum, post, delta) {
      return `
        <section class="metric-section">
          <div class="section-header">
            <div class="section-eyebrow">Guardrail · overall_login_success_rate</div>
            <h2 class="section-title">Login completion funnel</h2>
            <p class="section-sub">Distinct devices through assigned → welcome viewed → login succeeded. Conversion = succeeded ÷ welcome.</p>
          </div>
          <div class="comparison-grid">
            ${funnelCell('Week 1 · ramp', w1.funnel.steps, w1.funnel.flowA, w1.funnel.flowB, deriveRates(w1.funnel.flowA, w1.funnel.flowB), false)}
            ${funnelCell('Week 2 · cumulative', cum.funnel.steps, cum.funnel.flowA, cum.funnel.flowB, cum.funnel.rates, true)}
            ${funnelCell('Week 2 · post-100%', post.funnel.steps, post.funnel.flowA, post.funnel.flowB, post.funnel.rates, true)}
          </div>
          ${deltaBlock(delta)}
        </section>
      `;
    }

    function deriveRates(a, b) {
      return {
        flowA: { welcome: (a[1]/a[0]*100), conversion: (a[2]/a[1]*100) },
        flowB: { welcome: (b[1]/b[0]*100), conversion: (b[2]/b[1]*100) }
      };
    }

    function funnelCell(label, steps, a, b, rates, isLatest) {
      const max = Math.max(...a, ...b);
      const rows = steps.map((step, i) => `
        <div class="funnel-row">
          <div class="funnel-row-step">${step}</div>
          <div class="funnel-bar-track">
            <div class="funnel-bar-fill funnel-bar-flowA" style="width: ${a[i]/max*100}%"></div>
            <span class="funnel-bar-label">${fmtInt(a[i])}</span>
          </div>
          <div class="funnel-bar-track">
            <div class="funnel-bar-fill funnel-bar-flowB" style="width: ${b[i]/max*100}%"></div>
            <span class="funnel-bar-label">${fmtInt(b[i])}</span>
          </div>
        </div>
      `).join('');
      return `
        <div class="compare-cell ${isLatest ? 'is-latest' : ''}">
          <div class="compare-cell-label">${label}</div>
          <div class="funnel-rows">${rows}</div>
          <div class="funnel-rates">
            <span>Flow A conv <strong>${fmtPct(rates.flowA.conversion)}</strong></span>
            <span>Flow B conv <strong>${fmtPct(rates.flowB.conversion)}</strong></span>
          </div>
        </div>
      `;
    }

    function renderEmailCheck(w1, cum, post, delta) {
      return `
        <section class="metric-section">
          <div class="section-header">
            <div class="section-eyebrow">Flow B · the money signal</div>
            <h2 class="section-title">Email check distribution</h2>
            <p class="section-sub">When a Flow B user types email, the API returns one of: returning, temp_password (invited barber), new_user. Drop in temp_password share post-100% is worth tracking.</p>
          </div>
          <div class="comparison-grid">
            ${emailCheckCell('Week 1 · ramp', w1.emailCheck.totals, false)}
            ${emailCheckCell('Week 2 · cumulative', cum.emailCheck.totals, true)}
            ${emailCheckCell('Week 2 · post-100%', post.emailCheck.totals, true)}
          </div>
          ${deltaBlock(delta)}
        </section>
      `;
    }

    function emailCheckCell(label, totals, isLatest) {
      const t = totals.temp_password_total_pct ?? totals.temp_password_pct;
      const r = totals.returning_email_pct ?? totals.returning_pct;
      const n = totals.new_user_email_pct ?? totals.new_user_pct;
      const u = totals.username_total_pct;
      // Normalize so segments sum to ~100 for the visual bar (use raw values)
      const total = t + r + n + u;
      const seg = (v) => (v/total*100).toFixed(1);
      return `
        <div class="compare-cell ${isLatest ? 'is-latest' : ''}">
          <div class="compare-cell-label">${label}</div>
          <p class="compare-cell-stat">${t.toFixed(1)}<span class="compare-cell-stat-suffix">% temp_password</span></p>
          <div class="donut-stack" title="Distribution of email check results">
            <div class="donut-seg donut-seg-temp" style="width: ${seg(t)}%">${seg(t)}</div>
            <div class="donut-seg donut-seg-returning" style="width: ${seg(r)}%">${seg(r)}</div>
            <div class="donut-seg donut-seg-new" style="width: ${seg(n)}%">${seg(n)}</div>
            <div class="donut-seg donut-seg-username" style="width: ${seg(u)}%">${seg(u)}</div>
          </div>
          <div class="donut-legend">
            <div class="donut-legend-row"><span class="donut-legend-dot" style="background:var(--accent)"></span>temp_password</div>
            <div class="donut-legend-row"><span class="donut-legend-dot" style="background:var(--flow-a)"></span>returning</div>
            <div class="donut-legend-row"><span class="donut-legend-dot" style="background:var(--success)"></span>new_user</div>
            <div class="donut-legend-row"><span class="donut-legend-dot" style="background:var(--text-dim)"></span>username</div>
          </div>
        </div>
      `;
    }

    function renderNorthStar(w1, cum, post, delta) {
      const cats = w1.northStarData.categories;
      return `
        <section class="metric-section">
          <div class="section-header">
            <div class="section-eyebrow">North star · account creation</div>
            <h2 class="section-title">Distinct users by account_type / came_from</h2>
            <p class="section-sub">Indie via signup_link is the primary metric — still 0 across all snapshots (instrumentation gap or genuine null). Watch the leaked flowB barber/signup_link entries.</p>
          </div>
          <div class="comparison-grid">
            ${northStarCell('Week 1 · ramp', cats, w1.northStarData.flowA, w1.northStarData.flowB, false)}
            ${northStarCell('Week 2 · cumulative', cats, cum.northStarData.flowA, cum.northStarData.flowB, true)}
            ${northStarCell('Week 2 · post-100%', cats, post.northStarData.flowA, post.northStarData.flowB, true)}
          </div>
          ${deltaBlock(delta)}
        </section>
      `;
    }

    function northStarCell(label, cats, a, b, isLatest) {
      const rows = cats.map((c, i) => {
        const isZero = a[i] === 0 && b[i] === 0;
        return `
          <tr class="${isZero ? 'zero-row' : ''}">
            <td>${c}</td>
            <td>${fmtInt(a[i])}</td>
            <td>${fmtInt(b[i])}</td>
          </tr>
        `;
      }).join('');
      return `
        <div class="compare-cell ${isLatest ? 'is-latest' : ''}">
          <div class="compare-cell-label">${label}</div>
          <table class="compare-table">
            <thead>
              <tr>
                <th>Category</th>
                <th class="flowA">Flow A</th>
                <th class="flowB">Flow B</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      `;
    }

    function renderPerExposure(w1, cum, post, delta) {
      const w1A = w1.perExposure.flowA;
      const w1B = w1.perExposure.flowB;
      return `
        <section class="metric-section">
          <div class="section-header">
            <div class="section-eyebrow">Counterintuitive · early signal</div>
            <h2 class="section-title">Per-exposure barber signup rate</h2>
            <p class="section-sub">Barber accounts created via the signup path, divided by distinct devices in each variant. We'd want this to drop in Flow B if the experiment is redirecting invited barbers to login.</p>
          </div>
          <div class="comparison-grid">
            ${perExposureCell('Week 1 · ramp', w1A.rate, w1B.rate, w1A.numerator, w1A.denominator, w1B.numerator, w1B.denominator, false)}
            ${perExposureCell('Week 2 · cumulative', cum.perExposure.flowA.rate, cum.perExposure.flowB.rate, cum.perExposure.flowA.numerator, cum.perExposure.flowA.denominator, cum.perExposure.flowB.numerator, cum.perExposure.flowB.denominator, true)}
            ${perExposureCell('Week 2 · post-100%', post.perExposure.flowA.rate, post.perExposure.flowB.rate, post.perExposure.flowA.numerator, post.perExposure.flowA.denominator, post.perExposure.flowB.numerator, post.perExposure.flowB.denominator, true)}
          </div>
          ${deltaBlock(delta)}
        </section>
      `;
    }

    function perExposureCell(label, aRate, bRate, aN, aD, bN, bD, isLatest) {
      return `
        <div class="compare-cell ${isLatest ? 'is-latest' : ''}">
          <div class="compare-cell-label">${label}</div>
          <p class="compare-cell-stat" style="color: var(--flow-a)">${aRate.toFixed(1)}<span class="compare-cell-stat-suffix" style="color:var(--text-muted)">% Flow A</span></p>
          <p class="compare-cell-detail"><code>${aN} / ${aD}</code> barber/signup_link ÷ devices</p>
          <p class="compare-cell-stat" style="color: var(--flow-b); margin-top: 0.6rem">${bRate.toFixed(1)}<span class="compare-cell-stat-suffix" style="color:var(--text-muted)">% Flow B</span></p>
          <p class="compare-cell-detail"><code>${bN} / ${bD}</code> barber/email_not_found ÷ devices</p>
        </div>
      `;
    }

    function renderFriction(w1, cum, post, deltaForgot, deltaAbandon) {
      return `
        <section class="metric-section">
          <div class="section-header">
            <div class="section-eyebrow">Guardrails · login_failed + forgot_password + login_abandoned</div>
            <h2 class="section-title">Friction signals</h2>
            <p class="section-sub">Counts per variant. Flow A login_failed is 0 because legacy versions don't emit variant — known data quality issue, not a real zero.</p>
          </div>
          <div class="comparison-grid">
            ${frictionCell('Week 1 · ramp', w1.friction.events, w1.friction.flowA, w1.friction.flowB, false)}
            ${frictionCell('Week 2 · cumulative', cum.friction.events, cum.friction.flowA, cum.friction.flowB, true)}
            ${frictionCell('Week 2 · post-100%', post.friction.events, post.friction.flowA, post.friction.flowB, true)}
          </div>
          ${deltaBlock(deltaForgot)}
          ${deltaBlock(deltaAbandon)}
        </section>
      `;
    }

    function frictionCell(label, events, a, b, isLatest) {
      const max = Math.max(...a, ...b, 1);
      const rows = events.map((e, i) => `
        <div class="funnel-row">
          <div class="funnel-row-step">${e}</div>
          <div class="funnel-bar-track">
            <div class="funnel-bar-fill funnel-bar-flowA" style="width: ${a[i]/max*100}%"></div>
            <span class="funnel-bar-label">${fmtInt(a[i])}</span>
          </div>
          <div class="funnel-bar-track">
            <div class="funnel-bar-fill funnel-bar-flowB" style="width: ${b[i]/max*100}%"></div>
            <span class="funnel-bar-label">${fmtInt(b[i])}</span>
          </div>
        </div>
      `).join('');
      return `
        <div class="compare-cell ${isLatest ? 'is-latest' : ''}">
          <div class="compare-cell-label">${label}</div>
          <div class="funnel-rows">${rows}</div>
        </div>
      `;
    }

    function renderScopeLeak(cum, post, delta) {
      return `
        <section class="metric-section">
          <div class="section-header">
            <div class="section-eyebrow">Bug tracker · signup_link_tapped scope leak</div>
            <h2 class="section-title">Scope leak status</h2>
            <p class="section-sub">Flow B v3.23.0 emits signup_link_tapped from a shared firing site without variant guard. Fix in PR #4143 (pending merge + 3.23.1 release).</p>
          </div>
          <div class="comparison-grid">
            ${leakCell('Week 1 · ramp', { totalEvents: 5, distinctDevices: 3, fixStatus: 'audit done, PR pending' }, false)}
            ${leakCell('Week 2 · cumulative', cum.scopeLeak, true)}
            ${leakCell('Week 2 · post-100%', post.scopeLeak, true)}
          </div>
          ${deltaBlock(delta)}
        </section>
      `;
    }

    function leakCell(label, leak, isLatest) {
      return `
        <div class="compare-cell ${isLatest ? 'is-latest' : ''}">
          <div class="compare-cell-label">${label}</div>
          <p class="compare-cell-stat">${leak.totalEvents}<span class="compare-cell-stat-suffix">events / ${leak.distinctDevices} devices</span></p>
          <p class="compare-cell-detail">App version <code>${leak.appVersion ?? '3.23.0'}</code></p>
          <span class="leak-status is-active">● ${leak.fixStatus}</span>
        </div>
      `;
    }

    function renderOpenQuestions(qs) {
      return `
        <section class="metric-section">
          <div class="section-header">
            <div class="section-eyebrow">Open questions · for next sync</div>
            <h2 class="section-title">What we don't know yet</h2>
          </div>
          <ul class="questions-list">
            ${qs.map(q => `<li>${q}</li>`).join('')}
          </ul>
        </section>
      `;
    }

    function deltaBlock(d) {
      if (!d) return '';
      return `
        <div class="delta-block">
          <div class="delta-block-label">Delta · ${d.metric}</div>
          <p>${d.delta_takeaway}</p>
        </div>
      `;
    }

    load().catch(err => {
      console.error(err);
      document.getElementById('content').innerHTML = `<div class="loading">Failed to load snapshots: ${err.message}</div>`;
    });
  </script>
</body>
</html>
